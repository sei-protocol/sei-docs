name: Link checker

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

defaults:
  run:
    shell: bash

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mintlify CLI
        run: npm install -g mint

      - name: Validate docs.json schema
        run: mint --version && test -f docs.json

      - name: Check for broken links
        run: |
          # mint broken-links parses every .md/.mdx as MDX, but the generated agent
          # skills under .mintlify/skills/ are plain Markdown (HTML comment banner
          # etc.) and are not site pages — their links are checked by the
          # external-links workflow (lychee) instead. Stash them for this check.
          if [ -d .mintlify/skills ]; then mv .mintlify/skills /tmp/skills-stash; fi
          mint broken-links
          if [ -d /tmp/skills-stash ]; then mv /tmp/skills-stash .mintlify/skills; fi
