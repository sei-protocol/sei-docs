extends: substitution
message: "Use '%s' instead of '%s' (Sei terminology)."
link: https://github.com/sei-protocol/sei-docs/blob/main/AGENTS.md
level: warning
ignorecase: false
action:
  name: replace
# observed (wrong) form : preferred form. Patterns are written so the correct
# spelling never matches itself.
swap:
  'the Sei blockchain': Sei
  'Sei [Cc]hain': Sei
  'gas fees?': gas
  # Bare 'CW' is accepted shorthand for CosmWasm here — the standard names
  # CW20/CW721/CW1155 plus phrases like "CW pointer", "CW-based", and "CW NFT".
  # CosmWasm casing is still enforced by the rule below, so we don't flag bare CW.
  '[Cc]osmwasm': CosmWasm
  '[Mm]etamask': MetaMask
  'Sei-?[Jj][Ss]': sei-js
  'seijs': sei-js
